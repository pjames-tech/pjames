<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="head_grad" x1="64" y1="64" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="eye_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="128" fill="url(#bg_grad)"/>
  
  <!-- Outer Body/Shoulders subtle -->
  <path d="M64 220C64 200 80 184 100 184H156C176 184 192 200 192 220V240H64V220Z" fill="#1E293B" opacity="0.3"/>

  <!-- Robot Head Base -->
  <rect x="72" y="64" width="112" height="100" rx="20" fill="url(#head_grad)" stroke="#334155" stroke-width="2"/>
  
  <!-- Ear/Antenna Connectors -->
  <rect x="60" y="90" width="12" height="40" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="184" y="90" width="12" height="40" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>

  <!-- Face Plate panel -->
  <rect x="84" y="76" width="88" height="76" rx="12" fill="#020617" stroke="#1E293B" stroke-width="1"/>

  <!-- Glowing Eyes -->
  <circle cx="108" cy="110" r="8" fill="#FF7300" filter="url(#eye_glow)"/>
  <circle cx="148" cy="110" r="8" fill="#FF7300" filter="url(#eye_glow)"/>
  
  <!-- Subtle Eyes detail -->
  <circle cx="108" cy="110" r="3" fill="white" opacity="0.8"/>
  <circle cx="148" cy="110" r="3" fill="white" opacity="0.8"/>

  <!-- Circuit Lines -->
  <path d="M128 140V152" stroke="#FF7300" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M110 144H146" stroke="#FF7300" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Forehead indicator -->
  <rect x="120" y="82" width="16" height="2" rx="1" fill="#FF7300" opacity="0.5"/>

  <!-- Mouth/Grill -->
  <rect x="108" y="132" width="40" height="4" rx="2" fill="#1E293B"/>
  <path d="M112 134H116M120 134H124M128 134H132M136 134H140" stroke="#FF7300" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Reflection -->
  <path d="M80 70C90 66 110 66 120 70" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.1"/>
</svg>
