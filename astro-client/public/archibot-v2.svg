<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skin_grad" x1="128" y1="40" x2="128" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="plate_grad" x1="160" y1="60" x2="200" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="eye_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="circuit_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Synthetic Body/Neck -->
  <path d="M100 210c0-10 10-20 28-20s28 10 28 20v20h-56v-20z" fill="#0f172a"/>
  <path d="M60 230c0-20 30-40 68-40s68 20 68 40v26H60v-26z" fill="#1e293b" opacity="0.6"/>

  <!-- Humanoid Head Silhouette -->
  <path d="M128 40c-35 0-64 28-64 64 0 25 15 50 35 65 10 8 18 18 18 31v5h22v-5c0-13 8-23 18-31 20-15 35-40 35-65 0-36-29-64-64-64z" fill="url(#skin_grad)" stroke="#334155" stroke-width="1.5"/>

  <!-- Mechanical Plate (Right Side) -->
  <path d="M145 50c25 10 45 40 45 64 0 20-10 40-25 55l-20-119z" fill="url(#plate_grad)" opacity="0.4" stroke="#475569" stroke-width="1"/>
  <path d="M160 80h15M165 100h20M155 125h25" stroke="#334155" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Glowing Neural Interface (Circuitry) -->
  <g filter="url(#circuit_glow)">
    <path d="M128 45v20M110 55l10 10M146 55l-10 10" stroke="#ff7300" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M75 100c5-10 15-15 25-15" stroke="#ff7300" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Hybrid AI Eyes -->
  <g filter="url(#eye_glow)">
    <circle cx="100" cy="105" r="7" fill="#ff7300"/>
    <circle cx="156" cy="105" r="7" fill="#ff7300"/>
  </g>
  <circle cx="100" cy="105" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="156" cy="105" r="2.5" fill="white" opacity="0.9"/>

  <!-- Face Detailing -->
  <path d="M128 125v15M118 155c5 5 15 5 20 0" stroke="#334155" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Temporal Pulse (Right Ear Area) -->
  <circle cx="188" cy="105" r="4" fill="#ff7300" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
